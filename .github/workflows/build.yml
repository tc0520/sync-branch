name: Build desktop packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: sync-branch-macos
            artifact_path: |
              dist/electron/*.dmg
              dist/electron/*.zip
          - name: Windows
            os: windows-latest
            artifact_name: sync-branch-windows
            artifact_path: |
              dist/electron/*.exe
              dist/electron/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run tests
        run: npm test

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: Build package
        run: npm run dist:electron

      - name: List package outputs
        shell: bash
        run: find dist/electron -maxdepth 2 -type f -print

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify release version
        run: |
          PACKAGE_VERSION="$(node scripts/release-version.js "$GITHUB_REF_NAME")"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f -print

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find release-assets -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --title "sync-branch $PACKAGE_VERSION" \
              --notes "Desktop packages for sync-branch $PACKAGE_VERSION."
          fi
