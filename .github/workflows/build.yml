name: Build desktop packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: sync-branch-macos
            artifact_path: |
              dist/electron/*.dmg
              dist/electron/*.zip
          - name: Windows
            os: windows-latest
            artifact_name: sync-branch-windows
            artifact_path: |
              dist/electron/*.exe
              dist/electron/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Test Electron launcher
        run: npm run test:electron

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: Build package
        run: npm run dist:electron

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
